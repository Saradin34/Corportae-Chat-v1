worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 30m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Docker's embedded DNS server. Using a runtime resolver + variable
    # upstream means nginx will NOT fail to start if the backend container
    # is briefly unavailable (it resolves the name per-request instead of
    # once at boot). This prevents the whole nginx container from crashing.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Map for WebSocket upgrade headers
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # ---- Security headers (make the app trustworthy for AV/scanners) ----
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        # CSP: everything is same-origin & self-hosted — NO external CDNs.
        # 'unsafe-inline' is needed for the small inline bootstrap styles/SVG icon.
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' ws: wss:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
        server_tokens off;

        # ---- Static frontend (SPA) ----
        root /usr/share/nginx/html;
        index index.html;

        # index.html must NEVER be cached, so the browser always picks up
        # the latest ?v= asset references after a rebuild.
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        # ---- Service worker (notifications). Must be no-cache + root scope ----
        location = /sw.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Service-Worker-Allowed "/";
            expires -1;
            try_files $uri =404;
        }

        # ---- User uploads (images, files, avatars) ----
        # Served straight from the shared volume for speed.
        # NOTE: the "^~" is critical. Without it, the regex location below
        # (~* \.(jpg|png|...)$) would match /uploads/.../x.jpg FIRST (regex
        # locations outrank prefix locations) and look in the HTML root,
        # causing 404 for every uploaded image/avatar. "^~" tells nginx to
        # use this prefix and skip regex matching.
        location ^~ /uploads/ {
            alias /usr/share/nginx/uploads/;
            expires 30d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Static assets — no cache during development to avoid stale JS
        # after rebuilds. In production you can set expires 1h; public.
        location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            try_files $uri =404;
        }

        # ---- API proxy ----
        location /api/ {
            # Variable in proxy_pass forces per-request DNS resolution via
            # the resolver above (so a restarting backend doesn't break boot).
            set $backend "http://backend:8000";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        # ---- WebSocket proxy ----
        location /ws {
            set $backend_ws "http://backend:8000";
            proxy_pass $backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
