[libdefaults]
  default_realm = KUPAVA.BY
  dns_lookup_realm = false
  dns_lookup_kdc = true
  ticket_lifetime = 24h
  renew_lifetime = 7d
  forwardable = true
  # Разрешаем и AES, и RC4 (arcfour): браузер у тебя сейчас шлёт RC4-тикет,
  # а в keytab есть RC4-ключ — иначе acceptor отклоняет билет и браузер
  # падает на NTLM (окно "Безопасность Windows").
  permitted_enctypes   = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96 arcfour-hmac
  default_tkt_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96 arcfour-hmac
  default_tgs_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96 arcfour-hmac
  # RC4 формально считается "слабым" — без этого MIT krb5 может его игнорировать.
  allow_weak_crypto = true

[realms]
  KUPAVA.BY = {
    kdc = forseti.kupava.by
    admin_server = forseti.kupava.by
  }

[domain_realm]
  .kupava.by = KUPAVA.BY
  kupava.by = KUPAVA.BY
